<!DOCTYPE html>
<html>
<head>
	<title>Mi página web</title>
	<style type="text/css">
		body {
			background: linear-gradient(90deg, red, yellow);
		}
		button {
			font-size: 24px;
			border-radius: 10px;
			padding: 10px 20px;
			border: none;
			background-color: white;
			color: black;
			box-shadow: 0px 0px 5px 0px rgba(0,0,0,0.75);
			display: block;
			margin: 0 auto;
			margin-top: 50px;
		}
		h1 {
			font-size: 30px;
			font-weight: bold;
			text-align: center;
			margin-top: 50px;
		}
		label {
			font-size: 20px;
			font-weight: bold;
			display: block;
			text-align: center;
			margin-top: 50px;
		}
		input[type=text] {
			font-size: 20px;
			padding: 10px;
			border-radius: 10px;
			border: none;
			box-shadow: 0px 0px 5px 0px rgba(0,0,0,0.75);
			display: block;
			margin: 0 auto;
			margin-top: 20px;
			text-align: center;
		}
	</style>
</head>
<body>
	<label for="nombre">Escriba su nombre:</label>
	<input type="text" id="nombre">
	<button onclick="saludar()">Saludar</button>
	<h1 id="mensaje"></h1>

	<script type="text/javascript">
		function saludar() {
			var nombre = document.getElementById("nombre").value;
			if (nombre == "") {
				alert("Por favor, escriba su nombre.");
			} else {
				document.getElementById("mensaje").innerHTML = "Hola " + nombre + ". Bienvenido al curso.";
			}
		}
	</script>
</body>
</html>
